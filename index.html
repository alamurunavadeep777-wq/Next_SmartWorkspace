<!DOCTYPE html>
<html>

<head>
<title>Fatigue Detection System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>IoT Fatigue Detection Dashboard</h1>

<div class="box">

<button onclick="getTemp()">Measure Temperature</button>
<p>Temperature: <span id="temp">--</span> °C</p>

<button onclick="getSound()">Measure Sound</button>
<p>Sound Level: <span id="sound">--</span> dB</p>

<button onclick="getLight()">Measure Light</button>
<p>Light Intensity: <span id="light">--</span> lux</p>

</div>

<script src="script.js"></script>

</body>

</html>
